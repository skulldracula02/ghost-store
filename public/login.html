<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login - The Ghost Store</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="brand"><span class="logo-ghost">👻</span> The Ghost Store</div>
    <nav class="nav">
      <a class="btn ghost" href="index.html">Home</a>
      <a class="btn ghost" href="category.html">Categories</a>
      <a class="btn" href="cart.html">Cart</a>
    </nav>
  </header>

  <main class="container">
    <section class="card" style="max-width:420px;margin:40px auto">
      <h2>Login</h2>
      <p class="small">Enter your login .</p>
      <label class="small">Email</label>
      <input id="email" class="input" type="email" placeholder="you@example.com">
      <label class="small" style="margin-top:8px">Password</label>
      <input id="password" class="input" type="password" placeholder="password">
      <div style="margin-top:12px;display:flex;gap:8px">
        <button id="loginBtn" class="btn">Login</button>
        <a class="btn ghost" href="index.html">Continue as guest</a>
      </div>
      <p class="footer-note">This demo does not authenticate against a server. Hook your backend auth where indicated.</p>
    </section>
  </main>

  <script>
    document.getElementById('loginBtn').addEventListener('click', ()=>{
      // Mock login: store email in localStorage
      const email = document.getElementById('email').value.trim();
      if(!email) return alert('Enter an email');
      localStorage.setItem('ghostUser', JSON.stringify({email}));
      alert('Logged in as ' + email);
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
